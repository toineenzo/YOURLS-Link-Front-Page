services:
  db:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: yourls
      MARIADB_USER: yourls
      MARIADB_PASSWORD: yourlspass
      MARIADB_ROOT_PASSWORD: rootpass
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h localhost -u root -prootpass --silent"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 10s

  yourls:
    # Pin to a known-good upstream tag — the floating `latest` was shipping
    # a build whose PHP handler reset connections immediately after Apache
    # start on Ubuntu 24 runners.
    image: yourls:1.10
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "127.0.0.1:8080:80"
    environment:
      YOURLS_DB_HOST: db
      YOURLS_DB_USER: yourls
      YOURLS_DB_PASS: yourlspass
      YOURLS_DB_NAME: yourls
      YOURLS_SITE: http://127.0.0.1:8080
      YOURLS_USER: admin
      YOURLS_PASS: admin
      YOURLS_PRIVATE: "false"
    volumes:
      # ${PLUGIN_PATH} is set by the workflow to the *extracted debug zip*
      # so the tests run against exactly what is shipped. For local dev it
      # falls back to the repo root, which contains the same plugin files.
      - "${PLUGIN_PATH:-..}:/var/www/html/user/plugins/Link-Front-Page"
